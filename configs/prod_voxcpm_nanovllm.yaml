# Production-style Japanese wake-word config using Nano-vLLM VoxCPM2.

model_name: nee_livekit_nanovllm

target_phrases:
  - "ねぇライブキット"

tts_backend: voxcpm_nanovllm

voxcpm_tts:
  model_id: openbmb/VoxCPM2
  model_cache_relpath: voxcpm/VoxCPM2
  local_model_path: null
  load_denoiser: false
  cfg_values: [1.5, 2.0, 2.5, 3.0]
  inference_timesteps_list: [10]
  voice_design_prompts:
    - "young woman, clear voice, fast"
    - "young man, warm voice, fast"
    - "adult woman, low-pitched voice, fast"
    - "adult man, deep voice, fast"
    - "bright voice, fast"
    - "soft voice, fast"
    - "crisp voice, fast"
    - "light voice, fast"

voxcpm_nanovllm_tts:
  inference_timesteps: 10
  temperature_values: [1.0]
  devices: [0]
  max_num_seqs: 16
  concurrency: 8
  max_num_batched_tokens: 16384
  gpu_memory_utilization: 0.95
  enforce_eager: false

n_samples: 25000
n_samples_val: 5000
n_background_samples: 2000
n_background_samples_val: 500
tts_batch_size: 50

custom_negative_phrases:
  - "ねぇライフキット"
  - "ねぇドライブキット"
  - "ねぇライクキット"
  - "ねぇライブヒット"
  - "ねぇライブビット"
  - "ねぇライブイット"

data_dir: ./data
output_dir: ./output

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 3
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

model:
  model_type: conv_attention
  model_size: medium

steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50
