# Production-style Japanese wake-word config using Nano-vLLM VoxCPM2.

model_name: nee_livekit_nanovllm

target_phrases:
  - "ねぇライブキット"

tts_backend: voxcpm_nanovllm
tts_normalization:
  enabled: true
  max_duration_s: 2.5

voxcpm_tts:
  model_id: openbmb/VoxCPM2
  model_cache_relpath: voxcpm/VoxCPM2
  local_model_path: null
  load_denoiser: false
  cfg_values: [1.5, 2.0, 2.5, 3.0]
  inference_timesteps_list: [10]
  voice_design_prompts:
    - "A young adult woman, clear mid-pitch voice, fast pace, calm and professional"
    - "A young adult man, warm baritone, fast pace, friendly and articulate"
    - "A middle-aged woman, slightly low pitch, measured fast pace, confident tone"
    - "A middle-aged man, deep resonant voice, fast deliberate pace"
    - "An older adult woman, soft gentle voice, medium-fast pace, kind tone"
    - "An older adult man, gravelly tenor, medium-fast pace, matter-of-fact"
    - "A young woman, bright energetic tone, fast pace"
    - "A young man, light tenor, quick conversational pace"
    - "A woman in her thirties, smooth alto, even fast pace"
    - "A man in his thirties, clear baritone, brisk businesslike pace"
    - "A speaker with a higher pitch, enthusiastic and upbeat, fast pace"
    - "A speaker with a lower pitch, relaxed and laid-back, medium-fast pace"
    - "A young adult, gender-neutral delivery, soft volume, careful fast enunciation"
    - "A confident presenter voice, strong projection, fast speed"
    - "A quiet intimate voice, close-mic feel, medium-fast and clear"
    - "A news-anchor style voice, authoritative, brisk even rhythm"
    - "A friendly customer-service tone, slightly smiling, medium-fast pace"
    - "A tired but clear voice, subdued energy, steady fast pace"
    - "A cheerful animated voice, wide pitch range, lively fast pace"
    - "A serious formal voice, minimal emotion, precise fast articulation"
    - "A Southern US English accent, warm tone, quick conversational pace"
    - "A British English accent, clear RP-like delivery, medium-fast pace"
    - "A speaker with slight vocal fry, casual young adult, medium-fast pace"
    - "A very smooth polished voice, studio quality, medium-fast pace"
    - "A nasal bright tone, energetic, fast pace"
    - "A breathy soft voice, gentle, medium-fast pace"
    - "A robust athletic-sounding voice, strong and direct, fast pace"
    - "A scholarly tone, thoughtful but brisk pace"
    - "A teenager-sounding voice, casual, fast, light pitch"
    - "A mature executive voice, controlled low dynamics, brisk steady pace"
    - "A sing-song playful tone, varied pitch, medium-fast pace"
    - "A monotone flat delivery, robotic clarity, fast even speed"
    - "A husky voice, low energy, medium-fast pace"
    - "A crisp precise voice, minimal accent, fast clear speech"
    - "A young adult woman, bright soprano, fast conversational pace"
    - "A young adult man, mellow tenor, fast natural pace"
    - "A middle-aged woman, rich alto, quick friendly delivery"
    - "A middle-aged man, solid bass-baritone, fast clean delivery"
    - "An older woman, dry airy tone, brisk speaking style"
    - "An older man, textured low voice, brisk measured style"
    - "A bright youthful voice, high energy, fast pace"
    - "A soft restrained voice, low energy, medium-fast pace"
    - "A crisp studio voice, low noise, fast pace"
    - "A casual everyday voice, natural tone, fast pace"
    - "A polished narrator voice, smooth cadence, medium-fast pace"
    - "A direct assertive voice, sharp consonants, fast pace"
    - "A light cheerful voice, smiling tone, fast pace"
    - "A grounded steady voice, neutral affect, medium-fast pace"
    - "A youthful androgynous voice, clear diction, fast pace"
    - "A mature low-pitched voice, even rhythm, fast pace"

voxcpm_nanovllm_tts:
  inference_timesteps: 10
  temperature_values: [1.0]
  devices: [0]
  max_num_seqs: 16
  concurrency: 8
  max_num_batched_tokens: 16384
  gpu_memory_utilization: 0.95
  enforce_eager: false

n_samples: 50000
n_samples_val: 10000
n_background_samples: 2000
n_background_samples_val: 500
tts_batch_size: 50

custom_negative_phrases:
  - "ねぇライフキット"
  - "ねぇドライブキット"
  - "ねぇライクキット"
  - "ねぇライブヒット"
  - "ねぇライブビット"
  - "ねぇライブイット"

data_dir: ./data
output_dir: ./output

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 1
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

model:
  model_type: conv_attention
  model_size: medium

steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50
