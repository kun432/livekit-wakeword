# Minimal end-to-end config using Nano-vLLM VoxCPM2 for concurrent TTS generation.

model_name: test_nee_livekit_nanovllm

target_phrases:
  - "ねぇライブキット"

tts_backend: voxcpm_nanovllm

voxcpm_tts:
  voice_design_prompts:
    - "young woman, clear voice, fast"
    - "young man, warm voice, fast"
    - "adult woman, low-pitched voice, fast"
    - "adult man, deep voice, fast"
    - "bright voice, fast"
    - "soft voice, fast"
    - "crisp voice, fast"
    - "light voice, fast"
  cfg_values: [2.0]
  inference_timesteps_list: [10]

voxcpm_nanovllm_tts:
  inference_timesteps: 10
  temperature_values: [1.0]
  devices: [0]
  max_num_seqs: 8
  concurrency: 4
  max_num_batched_tokens: 8192
  gpu_memory_utilization: 0.9
  enforce_eager: false

n_samples: 24
n_samples_val: 8
n_background_samples: 40
n_background_samples_val: 8
tts_batch_size: 4

custom_negative_phrases:
  - "ねぇライフキット"
  - "ねぇドライブキット"
  - "ねぇライクキット"
  - "ねぇライブヒット"
  - "ねぇライブビット"
  - "ねぇライブイット"

data_dir: ./data
output_dir: ./output

augmentation:
  clip_duration: 2.0
  batch_size: 8
  rounds: 2
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

model:
  model_type: dnn
  model_size: tiny

steps: 500
learning_rate: 0.001
max_negative_weight: 1000
target_fp_per_hour: 1.0

batch_n_per_class:
  positive: 10
  adversarial_negative: 10
  ACAV100M_sample: 64
  background_noise: 10
