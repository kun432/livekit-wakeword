# Model name — used for output directory and exported model filename
#
# Multilingual wake words: you must use tts_backend: voxcpm (not Piper). Examples:
# configs/prod_voxcpm.yaml, configs/test_voxcpm.yaml (Chinese phrase).
model_name: hey_figure

# Wake word phrases to detect (include spelling variations)
target_phrases: ["hey figure"]

# ============================================================================
# Data Generation
# ============================================================================

# Training samples per class (positive + negative)
n_samples: 50000

# Validation samples per class
n_samples_val: 10000

n_background_samples: 4000
n_background_samples_val: 1000

# VITS TTS batch size (higher = faster, but more VRAM)
# Bumped from 50 → 150 for RTX 4090 (24GB VRAM)
tts_batch_size: 150

# Adversarial negatives — phrases structurally distinct enough to survive noise.
# Close phonetic variants (hey finger, hey vigor, hey bigger, etc.) are intentionally
# excluded — in high-noise conditions their embeddings overlap with "hey figure" and
# training on them hurts recall.
custom_negative_phrases:
  # Bare wake word without prefix — structurally different (missing "hey")
  - "figure"
  - "figures"
  # Clearly distinct partial/adjacent phrases
  - "they figure"
  - "I figured"
  - "we figured"
  - "you figured"
  - "just figured"

# ============================================================================
# TTS Parameters (VITS + SLERP speaker blending)
# ============================================================================

# Overall speech variability
noise_scales: [0.98]

# Phoneme duration variability
noise_scale_ws: [0.98]

# Speaking rate multipliers (slow / normal / fast)
length_scales: [0.75, 1.0, 1.25]

# SLERP interpolation weights for speaker blending
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]

# ============================================================================
# Paths
# ============================================================================

data_dir: ./data
output_dir: ./output

# ============================================================================
# Augmentation
# ============================================================================

augmentation:
  clip_duration: 2.0
  batch_size: 16
  # Bumped from 3 → 5 for noisy-device robustness: more augmentation passes
  # expose the model to a wider variety of SNRs and room conditions.
  rounds: 5
  background_paths:
    - ./data/backgrounds
  rir_paths: [./data/rirs]

# ============================================================================
# Model Architecture
# ============================================================================

model:
  model_type: conv_attention
  # Bumped from medium → large: more capacity helps handle noisy/degraded audio
  model_size: large

# ============================================================================
# Training
# ============================================================================

steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50 # pure ambient noise (HVAC, music, etc.)

